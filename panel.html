<div class="inline-drawer">
    <!-- Header: Drawer toggle -->
    <div class="inline-drawer-toggle inline-drawer-header userSettingsInnerExpandable" style="background: linear-gradient(90deg, rgba(99, 102, 241, 0.15), rgba(16, 185, 129, 0.15)); border-radius: 6px; padding: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer;">
        <b style="color: var(--SmartThemeTextAccentColor); font-size: 1.05em; display: flex; align-items: center; gap: 8px;">
            <i class="fa-solid fa-brain" style="color: #6366f1; animation: pulseBrain 2s infinite;"></i>
            <span>Anima Engine v0.12.3</span>
        </b>
        <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down" style="transition: transform 0.3s ease;"></div>
    </div>

    <!-- Content Area (Glassmorphic look) -->
    <div class="inline-drawer-content" style="padding: 15px; background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 0 0 6px 6px; margin-top: -1px; backdrop-filter: blur(10px); display: flex; flex-direction: column; gap: 12px;">
        
        <!-- Section 1: Time Clock -->
        <div id="anima_live_clock" style="display: flex; justify-content: space-between; align-items: center; background: rgba(99, 102, 241, 0.08); border: 1px solid rgba(99, 102, 241, 0.15); border-radius: 6px; padding: 8px 12px;">
            <span style="font-size: 0.82em; opacity: 0.85; color: var(--SmartThemeTextColor);">🕐 Thời gian thế giới:</span>
            <span id="anima_live_clock_value" style="font-weight: bold; color: #818cf8; font-family: monospace; font-size: 0.85em;">—</span>
        </div>

        <!-- Section 2: Vitals Status (Status & Emotion) -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div style="background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 6px; padding: 10px; display: flex; flex-direction: column; gap: 4px; justify-content: center; align-items: center; text-align: center;">
                <span style="font-size: 0.75em; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em;">Tác tử</span>
                <div id="cog_dash_status" style="font-weight: bold; color: #10b981; font-size: 1.1em; text-shadow: 0 0 8px rgba(16, 185, 129, 0.3);">Active</div>
            </div>
            
            <div style="background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 6px; padding: 10px; display: flex; flex-direction: column; gap: 4px; justify-content: center; align-items: center; text-align: center;">
                <span style="font-size: 0.75em; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em;">Cảm xúc đích</span>
                <div id="cog_dash_emotion" style="font-weight: bold; color: #38bdf8; font-size: 1.1em; text-shadow: 0 0 8px rgba(56, 189, 248, 0.3);">Neutral 😐</div>
            </div>
        </div>

        <!-- Section 3: Narrative Plan Box (GM Output) -->
        <div style="background: rgba(0, 0, 0, 0.25); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 6px; padding: 10px 12px; display: flex; flex-direction: column; gap: 6px;">
            <h4 style="margin: 0; font-size: 0.85em; color: var(--SmartThemeTextAccentColor); font-weight: bold; display: flex; align-items: center; gap: 6px;">
                <i class="fa-solid fa-map" style="color: #fbbf24;"></i>
                <span>Kịch bản kể chuyện (Narrative Plan)</span>
            </h4>
            <div id="cog_dash_thoughts" style="font-size: 0.82em; line-height: 1.45; background: rgba(0, 0, 0, 0.2); border-radius: 4px; padding: 8px 10px; color: #e2e8f0; font-family: monospace; border-left: 2px solid #fbbf24; word-break: break-word;">
                <i style="color: #64748b;">Chưa có kế hoạch kể chuyện nào...</i>
            </div>
        </div>

        <!-- Section 4: Cognitive Logger Container -->
        <div style="background: rgba(0, 0, 0, 0.25); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 6px; padding: 10px 12px; display: flex; flex-direction: column; gap: 8px;">
            <h4 style="margin: 0; font-size: 0.85em; color: var(--SmartThemeTextAccentColor); font-weight: bold; display: flex; justify-content: space-between; align-items: center;">
                <span style="display: flex; align-items: center; gap: 6px;">
                    <i class="fa-solid fa-terminal" style="color: #a855f7;"></i>
                    <span>Nhật ký nhận thức (Logs)</span>
                </span>
                <div style="display: flex; gap: 6px;">
                    <i id="cog_btn_copy_logs" class="fa-solid fa-copy" style="cursor: pointer; opacity: 0.7; transition: opacity 0.2s;" title="Sao chép log"></i>
                    <i id="cog_btn_download_logs" class="fa-solid fa-download" style="cursor: pointer; opacity: 0.7; transition: opacity 0.2s;" title="Tải log"></i>
                    <i id="cog_btn_clear_logs" class="fa-solid fa-trash" style="cursor: pointer; opacity: 0.7; transition: opacity 0.2s;" title="Xóa log"></i>
                </div>
            </h4>
            <div id="cog_logs_container" style="background: rgba(0, 0, 0, 0.3); border-radius: 4px; padding: 8px; height: 140px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; font-family: monospace; border: 1px solid rgba(255, 255, 255, 0.03);">
                <i style="color: #64748b; font-size: 0.82em;">Chưa có log nhận thức nào...</i>
            </div>
        </div>

        <!-- Section 5: Backstage Console Terminal Terminal -->
        <div style="background: rgba(0, 0, 0, 0.25); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 6px; padding: 10px 12px; display: flex; flex-direction: column; gap: 6px;">
            <h4 style="margin: 0; font-size: 0.85em; color: var(--SmartThemeTextAccentColor); font-weight: bold; display: flex; align-items: center; gap: 6px;">
                <i class="fa-solid fa-circle-nodes" style="color: #6366f1;"></i>
                <span>Hậu trường (Backstage Terminal)</span>
            </h4>
            <div style="display: flex; gap: 6px; align-items: center;">
                <input type="text" id="cog_admin_chat_input" style="flex-grow: 1; padding: 6px 10px; border-radius: 5px; border: 1px solid rgba(255, 255, 255, 0.05); background: rgba(0, 0, 0, 0.35); color: #f8fafc; font-size: 0.82em; font-family: monospace;" placeholder="Nhập lệnh (ví dụ: help, status)..." />
                <button id="cog_admin_send_btn" style="padding: 6px 12px; font-size: 0.8em; font-weight: 600; border-radius: 5px; border: 1px solid rgba(99, 102, 241, 0.3); background: rgba(99, 102, 241, 0.15); color: #818cf8; cursor: pointer; transition: all 0.2s; font-family: monospace;">Gửi</button>
            </div>
        </div>

    </div>
</div>
